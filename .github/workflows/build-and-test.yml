name: Build and Test Filtro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run business report tests
      run: |
        python3 test_business_report.py
    
    - name: Run processor tests
      run: |
        python3 test_processor.py

  build-windows:
    runs-on: windows-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build Windows executable with PyInstaller
      run: |
        pyinstaller Filtro.spec --clean --noconfirm
    
    - name: Upload Windows executable
      uses: actions/upload-artifact@v4
      with:
        name: Filtro-Windows-Executable
        path: dist/Filtro.exe
        retention-days: 30
    
    - name: Get file size
      run: |
        $size = (Get-Item dist/Filtro.exe).Length
        Write-Host "Executable size: $([math]::Round($size / 1MB, 2)) MB"

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pyinstaller
        pip3 install -r requirements.txt
    
    - name: Build Linux executable with PyInstaller
      run: |
        pyinstaller Filtro.spec --clean --noconfirm
    
    - name: Upload Linux executable
      uses: actions/upload-artifact@v4
      with:
        name: Filtro-Linux-Executable
        path: dist/Filtro
        retention-days: 30
    
    - name: Get file size
      run: |
        size=$(du -h dist/Filtro | cut -f1)
        echo "Executable size: $size"